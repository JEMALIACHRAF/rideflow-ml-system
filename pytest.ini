[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
markers =
    slow: slow tests
    integration: needs Redis/Kafka running
    gpu: needs CUDA GPU
log_cli = true
log_cli_level = INFO