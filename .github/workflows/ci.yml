name: CI — RideFlow ML

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"   # Weekly retrain trigger — Monday 2am

jobs:
  # ── Lint & Type check ────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install lint deps
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check . --ignore E501
      - name: Type check (non-blocking)
        run: mypy models/ features/ serving/ --ignore-missing-imports || true

  # ── Unit tests ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install lightgbm xgboost scikit-learn pandas numpy \
                      fastapi httpx pytest pytest-cov pytest-asyncio \
                      pydantic pydantic-settings redis loguru typer rich \
                      shap optuna scipy

      - name: Run tests
        run: |
          pytest tests/test_all.py -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=75 \
            -x  # stop on first failure

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with: { files: coverage.xml }

  # ── Docker build ──────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t rideflow-ml:${{ github.sha }} .
      - name: Test container starts
        run: |
          docker run -d --name test-api -p 8000:8000 rideflow-ml:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api

  # ── Weekly retrain ────────────────────────────────────────────────────────────
  retrain:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run training
        run: python models/train_all.py --experiment rideflow-weekly
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-${{ github.run_id }}
          path: saved_models/
          retention-days: 30
